services:
  aidal_sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: aidal_sim:latest
    container_name: aidal_sim
    environment:
      - DISPLAY=$DISPLAY
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
